spec_version: "0.1"
revision: "1"
execution:
  name: bcftools-norm
  version: "1.20"
  description: Left-align and normalize indels and split/join multiallelic sites against a reference.
  container: quay.io/biocontainers/bcftools:1.20--h8b25389_0
  command: >-
    bcftools norm -f {{inputs.ref_fasta}} -m {{parameters.multiallelics}}
    -O z -o {{outputs._dir}}/normalized.vcf.gz {{inputs.input_vcf}}
  inputs:
    input_vcf:
      type: file
      format: vcf
      required: true
      description: Input VCF/BCF.
    ref_fasta:
      type: file
      format: fasta
      required: true
      description: Reference FASTA used for left-alignment.
  outputs:
    normalized_vcf:
      type: file
      format: vcf
      pattern: "normalized.vcf.gz"
      description: Normalized, bgzipped VCF.
  parameters:
    multiallelics:
      type: select
      default: "-any"
      options: ["-any", "+any", "-both", "+both", "-snps", "-indels"]
      description: bcftools norm -m mode (- splits, + joins).
  categories: [vcf-ops]
  homepage: http://www.htslib.org/doc/bcftools.html
  citation: "Danecek et al. 2021, GigaScience, doi:10.1093/gigascience/giab008"
  license: MIT
