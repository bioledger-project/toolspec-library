spec_version: "0.1"
execution:
  name: bcftools-filter
  version: "1.20"
  description: Apply expression-based filters to a VCF, emitting a bgzipped filtered VCF.
  container: quay.io/biocontainers/bcftools:1.20--h8b25389_0
  command: >-
    bcftools filter -e "{{parameters.exclude_expression}}"
    -O z -o {{outputs._dir}}/filtered.vcf.gz {{inputs.input_vcf}}
  inputs:
    input_vcf:
      type: file
      format: vcf
      required: true
      description: Input VCF/BCF.
  outputs:
    filtered_vcf:
      type: file
      format: vcf
      pattern: "filtered.vcf.gz"
      description: Bgzipped VCF with failing sites/records excluded.
  parameters:
    exclude_expression:
      type: string
      default: "QUAL<20 || INFO/DP<10"
      description: bcftools -e expression; records matching it are excluded.
  categories: [vcf-ops]
  homepage: http://www.htslib.org/doc/bcftools.html
  citation: "Danecek et al. 2021, GigaScience, doi:10.1093/gigascience/giab008"
  license: MIT
