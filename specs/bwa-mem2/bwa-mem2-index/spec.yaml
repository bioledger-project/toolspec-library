spec_version: "0.1"
execution:
  name: bwa-mem2-index
  version: "2.2.1"
  description: Build a bwa-mem2 FM-index for a reference genome (run once per reference).
  container: quay.io/biocontainers/bwa-mem2:2.2.1--hd03093a_2
  command: >-
    bwa-mem2 index {{inputs.ref_fasta}}
  inputs:
    ref_fasta:
      type: file
      format: fasta
      required: true
      description: Reference genome FASTA to index (in-place; index files are written beside it).
  outputs:
    index_0123:
      type: file
      format: any
      pattern: "*.0123"
      description: bwa-mem2 index file part 1.
    index_amb:
      type: file
      format: any
      pattern: "*.amb"
      description: bwa-mem2 index file part 2 (ambiguity map).
    index_ann:
      type: file
      format: any
      pattern: "*.ann"
      description: bwa-mem2 index file part 3 (annotation).
    index_bwt:
      type: file
      format: any
      pattern: "*.bwt.2bit.64"
      description: bwa-mem2 BWT index (main index).
    index_pac:
      type: file
      format: any
      pattern: "*.pac"
      description: bwa-mem2 index file part 5 (packed sequence).
  categories: [reference-prep, alignment]
  homepage: https://github.com/bwa-mem2/bwa-mem2
  citation: "Vasimuddin et al. 2019, IEEE IPDPS, doi:10.1109/IPDPS.2019.00041"
  license: MIT
