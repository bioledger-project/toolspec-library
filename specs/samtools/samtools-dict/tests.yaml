cases:
  - name: render_dict
    inputs:
      ref_fasta: fixtures/ref.fasta
    expects:
      command_contains:
        - "samtools dict"
        - "ref.dict"
  - name: render_dict_double_suffix
    inputs:
      ref_fasta: fixtures/ref.fna.gz
    expects:
      command_contains:
        - "samtools dict"
        - "ref.dict"
