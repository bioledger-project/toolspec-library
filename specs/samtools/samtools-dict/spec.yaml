spec_version: "0.1"
revision: "1"
execution:
  name: samtools-dict
  version: "1.20"
  description: Create a sequence dictionary (.dict) for a reference genome (required by GATK).
  container: quay.io/biocontainers/samtools:1.20--h50ea8bc_1
  command: >-
    samtools dict -o {{outputs._dir}}/{{inputs.ref_fasta|stem(true)}}.dict {{inputs.ref_fasta}}
  inputs:
    ref_fasta:
      type: file
      format: fasta
      required: true
      description: Reference genome FASTA.
  outputs:
    dict:
      type: file
      format: any
      pattern: "*.dict"
      description: Sequence dictionary consumed by GATK tools (<ref-stem>.dict).
  categories: [reference-prep]
  homepage: http://www.htslib.org/
  citation: "Danecek et al. 2021, GigaScience, doi:10.1093/gigascience/giab008"
  license: MIT
