spec_version: "0.1"
execution:
  name: samtools-sort
  version: "1.20"
  description: Sort a SAM/BAM file by coordinate and emit a sorted BAM.
  container: quay.io/biocontainers/samtools:1.20
  command: >-
    samtools sort -@ {{parameters.threads}} -m {{parameters.memory}}
    -o {{outputs._dir}}/sorted.bam {{inputs.input_sam}}
  inputs:
    input_sam:
      type: file
      format: sam
      required: true
      description: Unsorted SAM (or BAM) alignment.
  outputs:
    sorted_bam:
      type: file
      format: bam
      pattern: sorted.bam
      description: Coordinate-sorted BAM.
  parameters:
    threads:
      type: integer
      default: 4
      min: 1
      max: 64
      description: Sort threads.
    memory:
      type: string
      default: "768M"
      description: Per-thread memory (samtools -m).
  categories: [alignment]
  homepage: http://www.htslib.org/
  citation: "Danecek et al. 2021, GigaScience, doi:10.1093/gigascience/giab008"
  license: MIT
